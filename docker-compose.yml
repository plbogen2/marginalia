version: '3.8'

services:
  marginalia:
    build: .
    container_name: marginalia
    ports:
      - "3000:3000"
    volumes:
      # Mount a local directory to persist SQLite data and workspace markdown files
      - marginalia_data:/root/.marginalia
      # Mount host SSH credentials so git client can push/pull to secure remote origins
      - ~/.ssh:/root/.ssh:ro
    environment:
      - PORT=3000
      - SESSION_SECRET=replace_with_a_secure_session_secret_key
      - GEMINI_API_KEY=
      # (Optional) GitHub Hosted OAuth credentials:
      # - GITHUB_CLIENT_ID=
      # - GITHUB_CLIENT_SECRET=
      # - ALLOWED_USER=

volumes:
  marginalia_data: